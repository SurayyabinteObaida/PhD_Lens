services:
  - type: web
    name: phdlens
    env: python
    buildCommand: pip install -r requirements-prod.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: phdlens-db
          property: connectionString
      - key: FLASK_DEBUG
        value: false

databases:
  - name: phdlens-db
    databaseName: phdlens
    user: phdlens
    plan: free